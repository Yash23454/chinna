<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Bantiii Nikosame 💖</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #ff9a9e, #fad0c4);
  overflow-x: hidden;
  text-align: center;
  color: white;
}

/* Floating hearts */
.heart {
  position: fixed;
  bottom: -10px;
  font-size: 20px;
  animation: float 6s linear infinite;
  opacity: 0.7;
}

@keyframes float {
  0% { transform: translateY(0); opacity: 0.7; }
  100% { transform: translateY(-100vh); opacity: 0; }
}

/* Glass card */
.container {
  margin-top: 60px;
  background: rgba(255,255,255,0.2);
  backdrop-filter: blur(10px);
  border-radius: 20px;
  padding: 30px;
  width: 85%;
  max-width: 600px;
  margin-left: auto;
  margin-right: auto;
  box-shadow: 0 8px 30px rgba(0,0,0,0.2);
}

h1 {
  font-size: 32px;
  margin-bottom: 10px;
}

button {
  padding: 12px 18px;
  margin: 8px;
  border: none;
  border-radius: 25px;
  background: #ff4d6d;
  color: white;
  font-size: 15px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #e63950;
  transform: scale(1.05);
}

#messageBox {
  margin-top: 20px;
  padding: 20px;
  background: rgba(255,255,255,0.3);
  border-radius: 15px;
  min-height: 100px;
  font-size: 18px;
  transition: opacity 0.4s ease-in-out;
}
</style>
</head>

<body>

<h1>Bantiii Nikosame 💖</h1>
<p>For every emotion you feel... I am right here with you ❤️</p>

<div class="container">

<button onclick="showMessage(missMe)">🥺 Miss Me</button>
<button onclick="showMessage(sad)">💔 Sad</button>
<button onclick="showMessage(insecure)">😔 Insecure</button>
<button onclick="showMessage(fight)">😡 After Fight</button>
<button onclick="showMessage(night)">🌙 Can't Sleep</button>

<div id="messageBox">Click any emotion… and feel my hug 🤍</div>

</div>

<script>

/* Floating Hearts Generator */
setInterval(() => {
  const heart = document.createElement("div");
  heart.classList.add("heart");
  heart.innerHTML = "💖";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = Math.random() * 20 + 15 + "px";
  document.body.appendChild(heart);
  setTimeout(() => heart.remove(), 6000);
}, 800);

/* Message Arrays */

const missMe = [
"Nuvvu nannu miss avutunte nenu kuda ade feel avutunna.",
"USA night aina, India morning aina mana love same.",
"Time difference mana heart difference kaadu.",
"Ee distance temporary, mana bond permanent.",
"Oka roju same time zone lo untam.",
"Naa heart permanent address nee peru.",
"Nuvvu naa world.",
"Naa future lo nuvve.",
"Airport lo first hug kosam wait chesthunna.",
"Nuvvu naa forever person."
];

const sad = [
"Edavaku amma, nenu neetho unna.",
"Sad days temporary.",
"Naa hug imagine chesuko.",
"Nuvvu strong girl.",
"Everything will be okay.",
"Nuvvu naa sunshine.",
"Naa support always.",
"Nuvvu precious.",
"Nuvvu alone kaadu.",
"Better days coming."
];

const insecure = [
"Nuvvu chala beautiful.",
"Naa eyes lo nuvve best.",
"Nuvvu enough.",
"Nuvvu irreplaceable.",
"Naa choice nuvve.",
"Nuvvu perfect for me.",
"Naa heart only for you.",
"Nuvvu valuable.",
"Nuvvu naa pride.",
"Nuvvu secure with me."
];

const fight = [
"Sorry if I hurt you.",
"Mana fight mana love kanna pedda kaadu.",
"Naa ego kanna mana bond important.",
"Nuvvu naa priority.",
"Let’s fix this together.",
"Naa love permanent.",
"Nuvvu naa best friend.",
"Nenu adjust avutha.",
"Naa heart neeku.",
"Mana bond unbreakable."
];

const night = [
"USA lo nenu nidrapotunna, kani naa heart nee daggara.",
"Good night amma.",
"Naa hug imagine chesuko.",
"Stars same mana sky lo.",
"Nuvvu safe with me.",
"Sweet dreams.",
"Naa words neeku lullaby la undali.",
"Nidra baga paduko.",
"Nuvvu naa moon.",
"Naa love always."
];

/* Random message with fade effect */
function showMessage(category) {
  const box = document.getElementById("messageBox");
  box.style.opacity = 0;
  setTimeout(() => {
    const randomIndex = Math.floor(Math.random() * category.length);
    box.innerText = category[randomIndex];
    box.style.opacity = 1;
  }, 200);
}

</script>

</body>
</html>
