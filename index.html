<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bantiii Nikosame 💖</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Poppins:wght@300;400;600&display=swap');

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  min-height: 100vh;
  overflow-x: hidden;
  text-align: center;
  color: #fff;
  position: relative;
}

/* Premium floating hearts with glow */
.heart {
  position: fixed;
  bottom: -20px;
  font-size: 24px;
  animation: floatPremium 8s ease-in-out infinite;
  opacity: 0.8;
  filter: drop-shadow(0 0 10px rgba(255,255,255,0.8));
  z-index: 1;
}

@keyframes floatPremium {
  0% { 
    transform: translateY(0) rotate(0deg) scale(1); 
    opacity: 0.8; 
  }
  50% { 
    transform: translateY(-50vh) rotate(180deg) scale(1.2); 
    opacity: 1; 
  }
  100% { 
    transform: translateY(-100vh) rotate(360deg) scale(0.8); 
    opacity: 0; 
  }
}

/* Premium glassmorphism container */
.container {
  max-width: 500px;
  margin: 80px auto 0;
  padding: 0;
  background: rgba(255, 255, 255, 0.1);
  backdrop-filter: blur(25px);
  -webkit-backdrop-filter: blur(25px);
  border-radius: 30px;
  border: 1px solid rgba(255, 255, 255, 0.2);
  box-shadow: 
    0 25px 45px rgba(0,0,0,0.2),
    inset 0 1px 0 rgba(255,255,255,0.3);
  overflow: hidden;
  position: relative;
}

.header {
  padding: 40px 30px 20px;
  background: linear-gradient(135deg, rgba(255,255,255,0.2), rgba(255,255,255,0.05));
}

.title {
  font-family: 'Playfair Display', serif;
  font-size: 42px;
  font-weight: 700;
  margin-bottom: 8px;
  background: linear-gradient(135deg, #fff, #f8e8ff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  text-shadow: 0 4px 20px rgba(255,255,255,0.3);
}

.subtitle {
  font-size: 18px;
  opacity: 0.9;
  font-weight: 300;
  letter-spacing: 1px;
}

/* Premium buttons */
.buttons {
  padding: 40px 30px;
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 15px;
}

button {
  flex: 1;
  min-width: 140px;
  padding: 16px 24px;
  border: none;
  border-radius: 50px;
  background: linear-gradient(135deg, rgba(255,255,255,0.2), rgba(255,255,255,0.1));
  backdrop-filter: blur(15px);
  color: #fff;
  font-size: 16px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  border: 1px solid rgba(255,255,255,0.3);
  box-shadow: 0 8px 25px rgba(0,0,0,0.15);
  position: relative;
  overflow: hidden;
}

button::before {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
  transition: left 0.6s;
}

button:hover::before {
  left: 100%;
}

button:hover {
  background: linear-gradient(135deg, rgba(255,255,255,0.3), rgba(255,255,255,0.2));
  transform: translateY(-5px) scale(1.05);
  box-shadow: 0 20px 40px rgba(0,0,0,0.25);
}

button:active {
  transform: translateY(-2px) scale(1.02);
}

/* Premium message box */
#messageBox {
  padding: 40px 30px 50px;
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(20px);
  min-height: 140px;
  font-size: 20px;
  font-weight: 400;
  line-height: 1.6;
  transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  border-top: 1px solid rgba(255,255,255,0.1);
  position: relative;
}

#messageBox::before {
  content: '🤍';
  position: absolute;
  top: 20px;
  right: 30px;
  font-size: 24px;
  opacity: 0.6;
}

.message-appear {
  animation: messageGlow 0.8s ease-out;
}

@keyframes messageGlow {
  0% { 
    opacity: 0; 
    transform: translateY(20px) scale(0.95);
    filter: blur(5px);
  }
  100% { 
    opacity: 1; 
    transform: translateY(0) scale(1);
    filter: blur(0);
  }
}

/* Responsive */
@media (max-width: 480px) {
  .title { font-size: 36px; }
  button { min-width: 120px; padding: 14px 20px; font-size: 15px; }
  .container { margin: 60px 20px; }
}

/* Custom scrollbar */
::-webkit-scrollbar {
  width: 8px;
}
::-webkit-scrollbar-track {
  background: rgba(255,255,255,0.1);
  border-radius: 10px;
}
::-webkit-scrollbar-thumb {
  background: rgba(255,255,255,0.3);
  border-radius: 10px;
}
::-webkit-scrollbar-thumb:hover {
  background: rgba(255,255,255,0.5);
}
</style>
</head>

<body>

<!-- Floating Hearts -->
<script>
setInterval(() => {
  const heart = document.createElement("div");
  heart.classList.add("heart");
  heart.innerHTML = ["💖","💕","💗","💝","🌸"][Math.floor(Math.random()*5)];
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = (Math.random() * 15 + 18) + "px";
  heart.style.animationDuration = (Math.random() * 3 + 6) + "s";
  document.body.appendChild(heart);
  setTimeout(() => heart.remove(), 9000);
}, 600);
</script>

<div class="container">
  <div class="header">
    <h1 class="title">Bantiii Nikosame 💖</h1>
    <p class="subtitle">For every emotion you feel... I am right here with you ❤️</p>
  </div>

  <div class="buttons">
    <button onclick="showMessage(missMe)">🥺 Miss Me</button>
    <button onclick="showMessage(sad)">💔 Sad</button>

    <button onclick="showMessage(fight)">😡 After Fight</button>
    <button onclick="nightMsg()">🌙 Can't Sleep</button>

  <div id="messageBox">Click any emotion… and feel my hug 🤍</div>
</div>

<script>

"Mana fight mana love kanna pedda kaadu 💔➡️💖",
"Naa ego kanna mana bond important 🤝",
"Nuvvu naa priority, number one 📱",

const night = [

function showMessage(category) {
  const box = document.getElementById("messageBox");
  box.classList.remove("message-appear");

  setTimeout(() => {
    const randomIndex = Math.floor(Math.random() * category.length);
    box.innerHTML = category[randomIndex];

}

function nightMsg() {

</script>

</body>
</html>
